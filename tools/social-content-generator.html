<!doctype html>
<html lang="en">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>eStack Canada Content Generator</title><style>body{font-family:Arial,sans-serif;background:#07111f;color:#eef5ff;margin:0;padding:24px}.wrap{max-width:920px;margin:auto}h1{color:#4dd7ff}label{display:block;margin-top:14px;font-weight:bold}input,select,textarea,button{width:100%;box-sizing:border-box;border-radius:10px;border:1px solid #355;padding:12px;margin-top:6px;font-size:16px}input,select,textarea{background:#0d1c31;color:#fff}button{background:#4dd7ff;color:#05101d;font-weight:bold;border:0;margin-top:18px}.card{background:#0d1c31;border:1px solid #24435f;border-radius:16px;padding:18px;margin-top:18px;white-space:pre-wrap}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head>
<body><div class="wrap"><h1>eStack Canada Content Generator</h1><p>Creates Canadian finance, AI, tools, deals and affiliate posts.</p><div class="grid"><div><label>Topic</label><input id="topic" placeholder="AI tools, credit cards, loans, Kitco, Shopify"/></div><div><label>Format</label><select id="format"><option>Instagram Reel</option><option>Instagram Caption</option><option>Carousel</option><option>TikTok Script</option><option>Pinterest Pin</option></select></div></div><label>Affiliate / link</label><input id="link" placeholder="estack.ca or affiliate link"/><label>Main point</label><textarea id="point" rows="3" placeholder="What should people learn or click?"></textarea><button onclick="generate()">Generate</button><div id="out" class="card">Your content will appear here.</div></div><script>function generate(){const topic=document.getElementById('topic').value||'free AI tools';const format=document.getElementById('format').value;const link=document.getElementById('link').value||'estack.ca';const point=document.getElementById('point').value||'Use smarter tools before spending money.';const hooks=[`3 things to know about ${topic}.`,`Stop wasting time — try this ${topic} tip.`,`This could save you money this week.`];const hook=hooks[Math.floor(Math.random()*hooks.length)];document.getElementById('out').textContent=`FORMAT: ${format}\n\nHOOK:\n${hook}\n\nON-SCREEN TEXT:\n${topic.toUpperCase()}\nQuick money + tech tip\n\nSCRIPT / CAPTION:\n${point}\n\nAt eStack, we track tools, finance products and online offers that may help Canadians make smarter decisions. Always compare terms before applying or buying.\n\nCTA:\nSee more at ${link}\n\nHASHTAGS:\n#eStack #CanadaFinance #AITools #MoneyTips #SideHustleCanada #AffiliateDisclosure\n\nDISCLOSURE:\neStack may earn a commission from some links at no extra cost to you.`}</script><script src="https://www.dwin2.com/pub.2936205.min.js"></script></body></html>
