name: Compliance Scrub - Remove VMG/GNE References

on:
  workflow_dispatch:

  jobs:
    scrub:
        runs-on: ubuntu-latest
            steps:
                  - uses: actions/checkout@v4
                          with:
                                    ref: compliance/scrub-vmg-gne
                                              token: ${{ secrets.GITHUB_TOKEN }}

                                                    - name: Replace compliance strings in HTML/XML files
                                                            run: |
                                                                      find . -name "*.html" -o -name "*.xml" | while read f; do
                                                                                  sed -i 's/VMG/estack.ca/g' "$f"
                                                                                              sed -i 's/Vaughan Mortgage Group/estack.ca/g' "$f"
                                                                                                          sed -i 's/vaughanmortgagegroup\.ca/estack.ca/g' "$f"
                                                                                                                      sed -i 's/Paul Malandrino/[author]/g' "$f"
                                                                                                                                  sed -i 's/GNE Mortgages\?/[lender]/g' "$f"
                                                                                                                                              sed -i 's/Lic\. #10394//g' "$f"
                                                                                                                                                          sed -i 's/FSRA #M25000307//g' "$f"
                                                                                                                                                                      sed -i 's/416-891-8684//g' "$f"
                                                                                                                                                                                  sed -i 's/416 891 8684//g' "$f"
                                                                                                                                                                                              sed -i 's/vaughanmortgages@gmail\.com//g' "$f"
                                                                                                                                                                                                          sed -i 's|https://calendly\.com/[^"'\'']*|#|g' "$f"
                                                                                                                                                                                                                    done
                                                                                                                                                                                                                    
                                                                                                                                                                                                                          - name: Commit changes
                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                            git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                      git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                git add -A
                                                                                                                                                                                                                                                                          git diff --staged --quiet || git commit -m "Compliance scrub: remove VMG/GNE personal references"
                                                                                                                                                                                                                                                                                    git push
