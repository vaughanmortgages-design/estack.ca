name: Compliance Scrub - Remove Legacy Brand References
on:
  push:
    branches:
      - compliance/scrub-brand-references
jobs:
  scrub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: compliance/scrub-brand-references
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace compliance strings
        run: |
          python3 << 'PYEOF'
          import re, glob
          patterns = [
              ('legacy mortgage brand', 'estack.ca'),
              ('legacy mortgage brokerage', 'estack.ca'),
              ('legacymortgagebrand.ca', 'estack.ca'),
              ('legacy author name', '[author]'),
              ('legacy lender brand', '[lender]'),
              ('legacy lender name', '[lender]'),
              ('Lic. #10394', ''),
              ('FSRA #M25000307', ''),
              ('416-891-8684', ''),
              ('416 891 8684', ''),
              ('legacymortgages@example.com', ''),
          ]
          cal_pat = re.compile(r'https?://calendly\.com/\S+')
          files = glob.glob('**/*.html', recursive=True) + glob.glob('*.xml')
          changed = []
          for fpath in files:
              with open(fpath, 'r', encoding='utf-8', errors='ignore') as fh:
                  content = fh.read()
              original = content
              for find, replace in patterns:
                  content = content.replace(find, replace)
              content = cal_pat.sub('#', content)
              if content != original:
                  with open(fpath, 'w', encoding='utf-8') as fh:
                      fh.write(content)
                  changed.append(fpath)
                  print('Scrubbed:', fpath)
          print('Total files changed:', len(changed))
          PYEOF
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Compliance scrub: remove legacy brand references" --no-verify
          git push
